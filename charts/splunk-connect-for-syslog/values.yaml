image:
  repository: ghcr.io/splunk/splunk-connect-for-syslog/container3
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true,
  # a name is generated using the fullname template
  name: ""

persistence:
  enabled: true
  annotations: {}
  size: "10Gi"

#  storageClass: ""

podAnnotations: {}

# By default SC4S runs as the unprivileged "syslog" user (UID/GID 1024) baked
# into the image. fsGroup ensures the persistent volume is writable by that
# group. seccompProfile=RuntimeDefault keeps the pod compliant with the Pod
# Security Standards "restricted" profile enforced by hardened distributions
# such as RKE2/OpenShift. Set podSecurityContext to {} to fall back to the
# image default (root).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1024
  runAsGroup: 1024
  fsGroup: 1024
  seccompProfile:
    type: RuntimeDefault

# The container drops all Linux capabilities and only adds NET_BIND_SERVICE so
# that the default privileged syslog ports (514/601) can still be bound while
# running as a non-root user. If you only use ports >1024 you can drop the
# capabilities.add list entirely. readOnlyRootFilesystem is intentionally left
# unset because the entrypoint writes generated config under /etc/syslog-ng.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  # readOnlyRootFilesystem: true

service:
  type: LoadBalancer
  usemetallb: {}
  metallbsharingkey: {}
  # externalTrafficPolicy controls how external traffic is routed to pods on
  # Service types `LoadBalancer` and `NodePort`. Defaults to `Local` to
  # preserve the original client source IP, which is required for correct
  # `HOST` enrichment of incoming syslog messages. Set to `Cluster` to allow
  # kube-proxy to load-balance traffic across all nodes at the cost of losing
  # the original source IP (kube-proxy will SNAT the traffic).
  externalTrafficPolicy: Local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as
  # a conscious choice for the user. This also increases chances charts run on
  # environments with little resources, such as Minikube. If you do want to
  # specify resources, uncomment the following lines, adjust them as necessary,
  # and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []
