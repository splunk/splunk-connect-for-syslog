image:
  repository: ghcr.io/splunk/splunk-connect-for-syslog/container3
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true,
  # a name is generated using the fullname template
  name: ""

persistence:
  enabled: true
  annotations: {}
  size: "10Gi"

#  storageClass: ""

podAnnotations: {}

# securityContext settings. Both default to an empty context, which preserves 
# the default behavior of running SC4S as root (recommended for existing
# deployments and standard runtimes).
#
# To run SC4S as the unprivileged "syslog" user (UID/GID 1024) baked into the
# image - required for hardened environments such as RKE2/OpenShift or any
# cluster that enforces the "restricted" Pod Security Standard -- uncomment the
# preset below AND move the listeners above 1024 via sc4s.listenPorts (e.g.
# 5514/5601). A non-root process cannot bind ports below 1024 in Kubernetes.
# The Service still exposes 514/601 externally and maps them to the 
# container ports.
podSecurityContext:
  {}
  # runAsNonRoot: true
  # runAsUser: 1024
  # runAsGroup: 1024
  # fsGroup: 1024
  # seccompProfile:
  #   type: RuntimeDefault

securityContext:
  {}
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #     - ALL

service:
  type: LoadBalancer
  usemetallb: {}
  metallbsharingkey: {}
  # externalTrafficPolicy controls how external traffic is routed to pods on
  # Service types `LoadBalancer` and `NodePort`. Defaults to `Local` to
  # preserve the original client source IP, which is required for correct
  # `HOST` enrichment of incoming syslog messages. Set to `Cluster` to allow
  # kube-proxy to load-balance traffic across all nodes at the cost of losing
  # the original source IP (kube-proxy will SNAT the traffic).
  externalTrafficPolicy: Local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as
  # a conscious choice for the user. This also increases chances charts run on
  # environments with little resources, such as Minikube. If you do want to
  # specify resources, uncomment the following lines, adjust them as necessary,
  # and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []
