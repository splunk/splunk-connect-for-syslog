block parser app-cef-netscout_arbor-edge() {
    channel {
        # Extract the key-value pairs from the message
        parser {
            kv-parser(prefix(".kv."));
        };

        # Check if deviceHostName was found and set it as the HOST
        rewrite {
            set("${.kv.deviceHostName}", value("HOST") 
                condition(not(filter(f_empty)) and match("." value(".kv.deviceHostName")))
            );
        };
        rewrite {
            r_set_splunk_dest_update_v2(
                index('netids'),
                sourcetype('netscout:aed')
                template('t_msg_only')
            );
        };

    };
};
application app-cef-netscout_arbor-edge[cef] {
	filter{
        "${.metadata.cef.device_vendor}" eq "NETSCOUT"
        and ( "${.metadata.cef.device_product}" eq "Arbor Enterprise Manager" 
                or "${.metadata.cef.device_product}" eq "Arbor Edge Defense"
                or "${.metadata.cef.device_product}" eq "Arbor Networks APS"
        );
    };
    parser { app-cef-netscout_arbor-edge(); };
};
