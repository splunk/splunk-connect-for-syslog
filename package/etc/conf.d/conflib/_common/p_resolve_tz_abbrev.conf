# Resolves a timezone abbreviation captured by an parser to a
# value accepted by syslog-ng's fix-time-zone(), via a CSV lookup.
#
# Mapping policy (see conf.d/conflib/_common/tz_abbrev.csv):
#
#   * Specific summer/winter abbreviations (EST/EDT, MST/MDT, CET/CEST, ...)
#     map to fixed offsets of the form Etc/GMT+/-N.
#
#   * Generic regional abbreviations (ET, CT, MT, PT) map to IANA region
#     names (America/New_York, ...).
#
#   * Always-no-DST zones (GMT, WET, MSK, AKST, HST, ...) use fixed offsets. 
#

block parser p_resolve_tz_abbrev(input(".tmp.tz")) {
    channel {
        if {
            filter { "${`input`}" ne ""; };
            parser {
                add-contextual-data(
                    selector("${`input`}"),
                    database("`syslog-ng-sysconfdir`/conf.d/conflib/_common/tz_abbrev.csv"),
                    ignore-case(yes)
                );
            };
            if {
                filter { "${.tmp.tz_fix}" ne ""; };
                rewrite {
                    fix-time-zone("${.tmp.tz_fix}");
                    unset(value(".tmp.tz_fix"));
                };
            };
        };
    };
};
