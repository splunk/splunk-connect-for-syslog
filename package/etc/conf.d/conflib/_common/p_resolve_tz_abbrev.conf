# Resolves a timezone abbreviation captured by an upstream parser to a
# value accepted by syslog-ng's fix-time-zone(), via a CSV lookup.
#
# Mapping policy (see conf.d/conflib/_common/tz_abbrev.csv):
#
#   * Specific summer/winter abbreviations (EST/EDT, MST/MDT, CET/CEST, ...)
#     map to fixed offsets of the form Etc/GMT+/-N. The abbreviation already
#     encodes whether DST is in effect; a region name (America/New_York,
#     Europe/Berlin, ...) would let syslog-ng re-derive DST from the date and
#     silently shift the timestamp by 1 hour for misconfigured / DST-unaware
#     devices. POSIX sign convention applies: Etc/GMT+N means UTC-N hours
#     (e.g. EST -> Etc/GMT+5).
#
#   * Generic regional abbreviations (ET, CT, MT, PT) map to IANA region
#     names (America/New_York, ...). These abbreviations explicitly mean
#     "Eastern/Central/Mountain/Pacific Time, follow whatever DST rule is in
#     effect for the date" -- so a DST-aware region name is the correct
#     interpretation, not a workaround.
#
#   * Always-no-DST zones (GMT, WET, MSK, AKST, HST, ...) use Etc/GMT for
#     consistency with the other fixed-offset entries.
#
# Ambiguous abbreviations are resolved to the SC4S default. Override
# per-source via add-contextual-data() keyed on ${HOST} or ${SOURCEIP} if
# you need a different interpretation:
#
#   IST  -> Irish Summer Time (UTC+1). Override for Indian Standard Time
#           (Asia/Kolkata, UTC+5:30) or Israel Standard Time (UTC+2/+3).
#   BST  -> British Summer Time (UTC+1). Override for Bangladesh (UTC+6).
#   CST  -> US Central Standard Time (UTC-6). Override for Australian
#           Central Standard Time (UTC+9:30).
#   EST  -> US Eastern Standard Time (UTC-5). Override for Australian
#           Eastern Standard Time (UTC+10).
#

block parser p_resolve_tz_abbrev(input(".tmp.tz")) {
    channel {
        if {
            filter { "${`input`}" ne ""; };
            parser {
                add-contextual-data(
                    selector("${`input`}"),
                    database("`syslog-ng-sysconfdir`/conf.d/conflib/_common/tz_abbrev.csv"),
                    ignore-case(yes)
                );
            };
            if {
                filter { "${.tmp.tz_fix}" ne ""; };
                rewrite {
                    fix-time-zone("${.tmp.tz_fix}");
                    unset(value(".tmp.tz_fix"));
                };
            };
        };
    };
};
