# Broadcom Layer7 API Gateway (formerly CA API Gateway / SecureSpan / SSG)
#
# Identifies the traffic-logger output emitted by the gateway's java.util.logging
# subsystem (logger category `com.l7tech.traffic`). The on-wire message looks like:
#   <PRI>Mmm DD HH:MM:SS <host> SSG[<pid>]: <LEVEL> com.l7tech.traffic: <payload>
#
# Field extraction is intentionally NOT performed here. The trailing payload is
# controlled by the gateway cluster property `trafficlogger.detail`, which is
# fully customer-configurable (delimiter, field order, and field count vary
# between deployments). Any column schema hard-coded here would be wrong for
# the next customer. Field parsing should be done at search time in Splunk.
#
# Ref: https://techdocs.broadcom.com/us/en/ca-enterprise-software/layer7-api-management/api-gateway/11-2/reference/gateway-cluster-properties/traffic-logger-cluster-properties.html

block parser app-syslog-broadcom_layer7_api_gateway() {
    channel {
        rewrite {
            r_set_splunk_dest_default(
                index('netops')
                sourcetype('broadcom:layer7_api_gateway')
                vendor("broadcom")
                product("layer7_api_gateway")
                template('t_hdr_msg')
            );
        };
    };
};

application app-syslog-broadcom_layer7_api_gateway[sc4s-syslog] {
    filter {
        message('com.l7tech.traffic' type(string) flags(substring));
    };
    parser {
        app-syslog-broadcom_layer7_api_gateway();
    };
};
